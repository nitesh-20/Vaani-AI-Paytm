<!DOCTYPE html>
<html>

<head>
    <title>Orion Connection Test</title>
    <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>

<body>
    <h1>Orion Voice Agent Connection Test</h1>
    <div id="status">Initializing...</div>
    <button id="connect">Connect & Enable Mic</button>
    <div id="logs" style="margin-top: 20px; font-family: monospace; font-size: 12px;"></div>

    <script>
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');

        function log(message) {
            console.log(message);
            logs.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
        }

        document.getElementById('connect').addEventListener('click', async () => {
            try {
                log('Fetching token...');
                const response = await fetch('http://localhost:8000/token?room=test-room&identity=test-user');
                const data = await response.json();
                log(`Token received. URL: ${data.url}`);

                const room = new LivekitClient.Room();

                room.on('connected', () => {
                    log('✅ Connected to room!');
                    status.textContent = 'Connected';
                });

                room.on('participantConnected', (participant) => {
                    log(`Participant connected: ${participant.identity}`);
                });

                room.on('trackSubscribed', (track, publication, participant) => {
                    log(`Track subscribed: ${track.kind} from ${participant.identity}`);
                });

                await room.connect(data.url, data.token);
                log('Enabling microphone...');
                await room.localParticipant.setMicrophoneEnabled(true);
                log('✅ Microphone enabled!');

            } catch (error) {
                log(`❌ Error: ${error.message}`);
                console.error(error);
            }
        });
    </script>
</body>

</html>
